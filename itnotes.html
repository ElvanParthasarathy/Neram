<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RMD IT – Digital Course Materials</title>

<style>
body {
  font-family: system-ui, -apple-system;
  background: #0b1220;
  color: #e5e7eb;
  padding: 20px;
}

h2 {
  margin-top: 40px;
  color: #38bdf8;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #020617;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
  text-align: center;
}

th {
  color: #22d3ee;
}

a {
  color: #22c55e;
  font-weight: 500;
  text-decoration: none;
}

.empty {
  color: #64748b;
}
</style>
</head>

<body>

<h1>📘 RMD – IT Department Notes</h1>
<div id="content"></div>

<script>
const PROXY = "https://api.allorigins.win/raw?url=";
const URL = "https://rmd.ac.in/dept/it/notes.html";

fetch(PROXY + encodeURIComponent(URL))
  .then(res => res.text())
  .then(html => {
    const doc = new DOMParser().parseFromString(html, "text/html");
    const tables = doc.querySelectorAll(".styled_table table.table");
    const container = document.getElementById("content");

    tables.forEach(table => {
      const title = table.querySelector("thead tr th")?.innerText.trim();
      if (!title) return;

      const outTable = document.createElement("table");
      outTable.innerHTML = `
        <thead>
          <tr>
            <th>Subject</th>
            <th>Unit 1</th>
            <th>Unit 2</th>
            <th>Unit 3</th>
            <th>Unit 4</th>
            <th>Unit 5</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;

      const tbody = outTable.querySelector("tbody");

      table.querySelectorAll("tbody tr").forEach(row => {
        const tds = row.querySelectorAll("td");
        if (tds.length < 8) return;

        const subject = tds[1].innerText.trim();
        if (!subject) return;

        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${subject}</td>`;

        for (let i = 3; i <= 7; i++) {
          const a = tds[i].querySelector("a");
          const href = a?.getAttribute("href");

          if (href && href !== "#" && href !== "") {
            tr.innerHTML += `<td><a href="${href}" target="_blank">Open</a></td>`;
          } else {
            tr.innerHTML += `<td class="empty">-</td>`;
          }
        }

        tbody.appendChild(tr);
      });

      container.innerHTML += `<h2>${title}</h2>`;
      container.appendChild(outTable);
    });
  })
  .catch(err => {
    console.error(err);
    document.body.innerHTML = "<h2>Failed to load IT notes</h2>";
  });
</script>

</body>
</html>
