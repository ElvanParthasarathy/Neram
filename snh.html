<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RMD – First Year Digital Course Materials</title>

<style>
body {
  font-family: system-ui, -apple-system;
  background: #020617;
  color: #e5e7eb;
  padding: 20px;
}
h2 { color: #38bdf8; margin-top: 40px; }
h3 { color: #22c55e; margin-top: 20px; }
table {
  width: 100%;
  border-collapse: collapse;
  background: #020617;
  margin-top: 10px;
}
th, td {
  border-bottom: 1px solid #1e293b;
  padding: 8px;
  text-align: center;
}
td.subject { text-align: left; }
a { color: #22c55e; text-decoration: none; }
.empty { color: #64748b; }
</style>
</head>

<body>

<h1>📘 RMD – First Year Digital Course Materials</h1>
<div id="app"></div>

<script>
const PROXY = "https://api.allorigins.win/raw?url=";
const URL = "https://rmd.ac.in/dept/snh/notes.html";

fetch(PROXY + encodeURIComponent(URL))
  .then(r => r.text())
  .then(html => {
    const doc = new DOMParser().parseFromString(html, "text/html");
    const app = document.getElementById("app");

    let currentDept = "";
    let currentSem = "";

    doc.querySelectorAll(".table.table-striped").forEach(table => {
      const heads = table.querySelectorAll("thead th");

      heads.forEach(h => {
        const t = h.innerText.trim();
        if (t.startsWith("DEPARTMENT")) currentDept = t;
        if (t.includes("Semester")) currentSem = t;
      });

      const rows = table.querySelectorAll("tbody tr");
      if (!rows.length) return;

      const out = document.createElement("table");
      out.innerHTML = `
        <thead>
          <tr>
            <th>Subject</th>
            <th>Unit 1</th>
            <th>Unit 2</th>
            <th>Unit 3</th>
            <th>Unit 4</th>
            <th>Unit 5</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;

      let hasData = false;
      const tbody = out.querySelector("tbody");

      rows.forEach(r => {
        const tds = r.querySelectorAll("td");
        if (tds.length < 4) return;

        const subject = tds[1]?.innerText.trim();
        if (!subject) return;

        hasData = true;
        const tr = document.createElement("tr");
        tr.innerHTML = `<td class="subject">${subject}</td>`;

        for (let i = 3; i <= 7; i++) {
          const a = tds[i]?.querySelector("a");
          const href = a?.getAttribute("href");
          if (href && href !== "#" && href !== "") {
            tr.innerHTML += `<td><a href="${href}" target="_blank">Open</a></td>`;
          } else {
            tr.innerHTML += `<td class="empty">-</td>`;
          }
        }

        tbody.appendChild(tr);
      });

      if (hasData) {
        app.innerHTML += `<h2>${currentDept}</h2>`;
        app.innerHTML += `<h3>${currentSem}</h3>`;
        app.appendChild(out);
      }
    });
  })
  .catch(() => {
    document.body.innerHTML = "<h2>Failed to load SNH notes</h2>";
  });
</script>

</body>
</html>
