<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Mukta+Malar:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Theme color: set dynamically by inline script below -->
  <meta name="theme-color" content="#F2F2F7" />
  <link rel="manifest" href="/admin-manifest.json" />

  <!-- Apple PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Neram Admin" />
  <link rel="apple-touch-icon" href="/adminneram.svg" />

  <title>Neram Admin</title>

  <script>
    (function () {
      try {
        // 1. Get the user's saved preference
        const savedTheme = localStorage.getItem('neram-theme') || 'auto';
        // 2. Check the device's system preference
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        // 3. Determine if we should force Dark Mode
        const shouldBeDark = savedTheme === 'dark' || (savedTheme === 'auto' && systemDark);

        // 4. Apply the class to the <html/> tag INSTANTLY
        const root = document.documentElement;
        if (shouldBeDark) {
          root.classList.add('dark');
          root.classList.remove('light');
        } else {
          root.classList.add('light');
          root.classList.remove('dark');
        }

        // 5. Update theme-color meta tag BEFORE React loads (prevents status bar flash)
        var themeColor = shouldBeDark ? '#000000' : '#F2F2F7';
        var meta = document.querySelector("meta[name='theme-color']");
        if (meta) meta.setAttribute('content', themeColor);

        // 6. Also update Apple status bar style
        var appleMeta = document.querySelector("meta[name='apple-mobile-web-app-status-bar-style']");
        if (appleMeta) appleMeta.setAttribute('content', shouldBeDark ? 'black-translucent' : 'default');
      } catch (e) {
        // Fail silently if localStorage is blocked
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/admin-main.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>

</html>
